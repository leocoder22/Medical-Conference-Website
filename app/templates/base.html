<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Medical Conference{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=4">
</head>

<body class="min-h-screen">

    {% include 'includes/navbar.html' %}

    <main class="min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-12">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 px-4 py-3 rounded-xl shadow-sm fade-in-up
                            {% if category == 'success' %} bg-green-100 text-green-800
                            {% elif category == 'danger' %} bg-red-100 text-red-800
                            {% elif category == 'warning' %} bg-yellow-100 text-yellow-800
                            {% else %} bg-blue-100 text-blue-800
                            {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>

    {% include 'includes/footer.html' %}

    <script src="{{ url_for('static', filename='js/main.js') }}?v=2"></script>
</body>
</html>
