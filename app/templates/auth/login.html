{% extends 'base.html' %}

{% block title %}Login | MAHATROPACON 2026{% endblock %}

{% block content %}

<section class="py-16">
    <div class="max-w-md mx-auto soft-card rounded-3xl p-8 md:p-10 fade-in-up">

        <h1 class="text-3xl font-bold text-center mb-6">
            Login to <span class="gradient-text">Portal</span>
        </h1>

        <p class="text-center text-slate-600 text-sm mb-6">
            Use your registered email and mobile number
        </p>

        <form method="POST" class="space-y-5">

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">
                    Email Address
                </label>
                <input
                    type="email"
                    name="identifier"
                    placeholder="Enter your registered email"
                    class="input-field"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your mobile number"
                    class="input-field"
                    required
                >
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full primary-btn py-3">
                Login
            </button>

        </form>

        <!-- Help -->
        <div class="mt-6 text-center text-sm text-slate-500">
            Not registered?
            <a href="{{ url_for('auth.conference_registration') }}"
               class="text-blue-600 hover:underline font-medium">
                Register for Conference
            </a>
        </div>

    </div>
</section>

{% endblock %}
