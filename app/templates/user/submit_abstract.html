{% extends 'base.html' %}

{% block title %}Submit Abstract | MAHATROPACON 2026{% endblock %}

{% block content %}

<section class="py-16">
    <div class="max-w-4xl mx-auto soft-card rounded-3xl p-8 md:p-10 fade-in-up">

        <h1 class="text-3xl md:text-4xl font-bold text-center mb-3">
            Submit <span class="gradient-text">Abstract</span>
        </h1>

        <p class="text-center text-slate-600 mb-8">
            Logged in as {{ current_user.email }}
        </p>

        <form method="POST" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Abstract Title</label>
                <input
                    type="text"
                    name="title"
                    class="input-field"
                    placeholder="Enter abstract title"
                    required
                >
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
                    <select name="category" class="input-field" required>
                        <option value="">Select Category</option>
                        <option value="Under Graduate (UG)">Under Graduate (UG)</option>
                        <option value="Post Graduate (PG)">Post Graduate (PG)</option>
                        <option value="Post PG">Post PG</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Presentation Preference</label>
                    <select name="presentation_preference" class="input-field">
                        <option value="Oral/Poster">Oral/Poster</option>
                        <option value="Oral">Oral</option>
                        <option value="Poster">Poster</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Authors</label>
                <textarea
                    name="authors"
                    rows="3"
                    class="input-field"
                    placeholder="Enter all author names"
                    required
                ></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Presenting Author</label>
                <input
                    type="text"
                    name="presenting_author"
                    class="input-field"
                    placeholder="Enter presenting author name"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Keywords</label>
                <input
                    type="text"
                    name="keywords"
                    class="input-field"
                    placeholder="Enter keywords separated by commas"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Abstract Text</label>
                <textarea
                    name="abstract_text"
                    rows="10"
                    class="input-field"
                    placeholder="Paste or type the full abstract here"
                    required
                ></textarea>
            </div>

            <div class="flex flex-wrap gap-3 pt-2">
                <button type="submit" class="primary-btn">
                    Submit Abstract
                </button>

                <a href="{{ url_for('user.abstract_portal') }}" class="secondary-btn">
                    Back to Portal
                </a>
            </div>

        </form>
    </div>
</section>

{% endblock %}
